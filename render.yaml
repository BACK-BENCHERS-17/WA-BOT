services:
  - type: web
    name: wa-command
    env: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm@10.26.1 && pnpm install --no-frozen-lockfile && BASE_PATH=/ pnpm --filter @workspace/whatsapp-bot run build && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wa-command-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: wa-command-db
    databaseName: wacommand
    user: wacommand
    plan: free
